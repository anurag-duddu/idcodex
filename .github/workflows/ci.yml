name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, test & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test

      - name: Build
        run: npm run build
        env:
          # Placeholders only — the app reads env lazily at request time, so the
          # build never connects to these. Real values live in Vercel for deploys.
          DATABASE_URL: postgres://ci:ci@localhost:5432/ci
          AUTH_SECRET: ci-placeholder-secret-not-used-at-build
          APP_URL: http://localhost:3000
          NEXT_TELEMETRY_DISABLED: "1"
